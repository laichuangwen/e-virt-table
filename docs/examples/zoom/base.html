<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table</title>
        <style>
            .zoom-toolbar {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }
            .zoom-toolbar span {
                min-width: 48px;
                font-size: 14px;
            }
        </style>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <body>
        <div class="zoom-toolbar">
            <button id="zoomOut">缩小</button>
            <button id="zoomReset">100%</button>
            <button id="zoomIn">放大</button>
            <span id="zoom-label">100%</span>
            <span style="color: #999; font-size: 12px">Ctrl + 滚轮缩放</span>
        </div>
        <div id="e-virt-table"></div>
    </body>
    <script>
        function generateData(c = 50, r = 200) {
            let columns = [
                {
                    type: 'index',
                    key: 'index',
                    width: 70,
                },
                {
                    title: 'Date',
                    key: 'date',
                },
                {
                    title: 'Name',
                    key: 'name',
                },
                {
                    title: 'State',
                    key: 'state',
                },
                {
                    title: 'City',
                    key: 'city',
                },
                {
                    title: 'Address',
                    key: 'address',
                    width: 200,
                },
                {
                    title: 'Zip',
                    key: 'zip',
                },
            ];
            let gcData = {};
            for (let i = 0; i < c; i += 1) {
                columns.push({
                    title: `Header_${i}`,
                    key: `gc_${i}`,
                });
                gcData[`gc_${i}`] = `data_${i}`;
            }
            let data = [];
            let _gcData = {
                date: '2016-05-02',
                name: 'John',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
                ...gcData,
            };
            for (let i = 0; i < r; i += 1) {
                data.push(JSON.parse(JSON.stringify(_gcData)));
            }

            return {
                columns,
                data,
            };
        }

        const ZOOM_STEP = 0.1;
        const { columns, data } = generateData(50, 200);
        const target = document.getElementById('e-virt-table');
        const label = document.getElementById('zoom-label');
        const grid = new EVirtTable(target, {
            data,
            columns,
            config: {
                ENABLE_SELECTOR: true,
                HEIGHT: 350,
            },
        });

        const updateZoomLabel = (zoom) => {
            label.textContent = `${Math.round(zoom * 100)}%`;
        };

        grid.on('zoomChange', (val) => {
            console.log(val);
            updateZoomLabel(grid.getZoom());
        });

        document.getElementById('zoomIn').addEventListener('click', () => {
            grid.setZoom(grid.getZoom() + ZOOM_STEP);
        });
        document.getElementById('zoomOut').addEventListener('click', () => {
            grid.setZoom(grid.getZoom() - ZOOM_STEP);
        });
        document.getElementById('zoomReset').addEventListener('click', () => {
            grid.setZoom(1);
        });
    </script>
</html>

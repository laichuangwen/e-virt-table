<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table</title>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <body>
        <div id="e-virt-table"></div>
    </body>
    <script>
        let data = [
            {
                id: '1',
                date: '2016-05-02',
                name: 'Tom',
                state: 'Shanghai',
                city: 'Putuo District',
                address: '1518 Jinshajiang Road, Putuo District, Shanghai',
                zip: 200333,
                children: [], // Marks has children; no children means leaf node
                _hasChildren: true, // Marks has children
            },
            {
                id: '2',
                date: '2016-05-04',
                name: 'Tom',
                state: 'Shanghai',
                city: 'Putuo District',
                address: '1517 Jinshajiang Road, Putuo District, Shanghai',
                zip: 200333,
            },
            {
                id: '3',
                date: '2016-05-01',
                name: 'Tom',
                state: 'Shanghai',
                city: 'Putuo District',
                address: '1519 Jinshajiang Road, Putuo District, Shanghai',
                zip: 200333,
            },
            {
                id: '4',
                date: '2016-05-03',
                name: 'Tom',
                state: 'Shanghai',
                city: 'Putuo District',
                address: '1516 Jinshajiang Road, Putuo District, Shanghai',
                zip: 200333,
            },
        ];
        let columns = [
            {
                title: 'ID',
                key: 'id',
                readonly: true,
                width: 120,
            },
            {
                type: 'tree',
                title: 'Date',
                key: 'date',
                readonly: true,
                width: 120,
            },
            {
                title: 'Name',
                key: 'name',
                readonly: true,
            },
            {
                title: 'State',
                key: 'state',
                readonly: true,
            },
            {
                title: 'City',
                key: 'city',
                readonly: true,
            },
            {
                title: 'Address',
                key: 'address',
                readonly: true,
                width: 200,
            },
            {
                title: 'Zip',
                key: 'zip',
                readonly: true,
            },
        ];
        const target = document.getElementById('e-virt-table');
        const grid = new EVirtTable(target, {
            data,
            columns,
            config: {
                ROW_KEY: 'id', // Set row unique key
                EXPAND_LAZY: true,
                EXPAND_LAZY_METHOD: function (params) {
                    const id = params.row.id; // Get current row id
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            const list = [
                                {
                                    id: `${id}-1`,
                                    date: '2016-05-04',
                                    name: 'Tom',
                                    state: 'Shanghai',
                                    city: 'Putuo District',
                                    address: '1517 Jinshajiang Road, Putuo District, Shanghai',
                                    children: [], // Marks has children; no children means leaf node
                                    _hasChildren: true, // Marks has children
                                    zip: 200333,
                                },
                                {
                                    id: `${id}-2`,
                                    date: '2016-05-01',
                                    name: 'Tom',
                                    state: 'Shanghai',
                                    city: 'Putuo District',
                                    address: '1519 Jinshajiang Road, Putuo District, Shanghai',
                                    children: [], // No _hasChildren means leaf node
                                    zip: 200333,
                                },
                                {
                                    id: `${id}-3`,
                                    date: '2016-05-03',
                                    name: 'Tom',
                                    state: 'Shanghai',
                                    city: 'Putuo District',
                                    address: '1516 Jinshajiang Road, Putuo District, Shanghai',
                                    zip: 200333,
                                },
                            ];
                            resolve(list);
                        }, 1000);
                    });
                },
            },
        });
    </script>
</html>

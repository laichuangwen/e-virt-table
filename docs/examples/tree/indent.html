<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree - Custom Indent Example</title>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <label>Tree indent width: </label>
        <input type="range" id="indent-slider" min="8" max="32" value="16" step="4">
        <span id="indent-value">16px</span>
        <button onclick="updateIndent()">Update Indent</button>
    </div>
    <div id="e-virt-table"></div>
</body>
<script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
<script>
    let data = [
        {
            id: '1',
            name: 'Department A',
            children: [
                {
                    id: '1-1',
                    name: 'Sub-department A1',
                    children: [
                        { id: '1-1-1', name: 'Employee A1-1' },
                        { id: '1-1-2', name: 'Employee A1-2' }
                    ]
                },
                {
                    id: '1-2',
                    name: 'Sub-department A2',
                    children: [
                        { id: '1-2-1', name: 'Employee A2-1' },
                        { id: '1-2-2', name: 'Employee A2-2' }
                    ]
                }
            ]
        },
        {
            id: '2',
            name: 'Department B',
            children: [
                {
                    id: '2-1',
                    name: 'Sub-department B1',
                    children: [
                        { id: '2-1-1', name: 'Employee B1-1' },
                        { id: '2-1-2', name: 'Employee B1-2' }
                    ]
                }
            ]
        }
    ];

    let columns = [
        {
            title: 'ID',
            key: 'id',
            width: 100,
            readonly: true
        },
        {
            title: 'Name',
            key: 'name',
            width: 200,
            readonly: true,
            type: 'tree' // Use tree type
        }
    ];

    const target = document.getElementById('e-virt-table');
    let table = new EVirtTable(target, {
        data,
        columns,
        config: {
            TREE_INDENT: 20, // Default tree indent width
            ROW_KEY: 'id',
            HEIGHT: 300
        }
    });

    // Update indent function
    function updateIndent() {
        const indentValue = document.getElementById('indent-slider').value;
        document.getElementById('indent-value').textContent = indentValue + 'px';
        console.log(indentValue);

        table.loadConfig({
            TREE_INDENT: parseInt(indentValue),
            ROW_KEY: 'id',
            HEIGHT: 400
        })
    }

    // Listen for slider change
    document.getElementById('indent-slider').addEventListener('input', function() {
        document.getElementById('indent-value').textContent = this.value + 'px';
    });

    // Listen for expand change
    table.on('expandChange', (expandedRows) => {
        console.log('Expanded rows:', expandedRows);
    });
</script>
</html>

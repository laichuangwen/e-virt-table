<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table</title>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <body>
        <div>
            <button id="verify-btn">Verify</button>
            <button id="clear-btn">Clear Verification</button>
        </div>
        <div>
            <div id="e-virt-table"></div>
        </div>
    </body>
    <script>
        let data = [
            {
                date: '2016-05-03',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-02',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-04',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-01',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-08',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-06',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
            {
                date: '2016-05-07',
                name: 'Tom',
                state: 'California',
                city: 'Los Angeles',
                address: 'No. 189, Grove St, Los Angeles',
                zip: 'CA 90036',
            },
        ];
        let columns = [
            {
                title: 'Name',
                key: 'name',
                readonly: true,
                width: 100,
                widthFillDisable: true,
            },
            {
                title: 'State',
                key: 'state',
                width: 100,
                widthFillDisable: true,
            },
            {
                title: 'City',
                key: 'city',
                width: 100,
                widthFillDisable: true,
            },
            {
                title: 'Address',
                key: 'address',
                width: 200,
                widthFillDisable: true,
            },
            {
                title: 'Zip',
                key: 'zip',
                rules: [
                    {
                        type: 'number',
                        message: 'Zip must be a number',
                    },
                ],
            },
            {
                title: 'email',
                key: 'email',
                rules: [
                    {
                        required: true,
                        message: 'Please enter',
                    },
                    {
                        required: true,
                        type: 'email',
                        message: 'Please enter a valid email address',
                    },
                ],
            },
        ];
        const target = document.getElementById('e-virt-table');
        const grid = new EVirtTable(target, {
            data,
            columns,
            config: {
                RESIZE_COLUMN_MIN_WIDTH: 100, // Minimum column resize width
                ENABLE_SELECTOR: true,
                ENABLE_AUTOFILL: true,
                ENABLE_HISTORY: true,
                BODY_CELL_RULES_METHOD: ({ rowIndex, column }) => {
                    // Skip validation for email when rowIndex is 0 or 1
                    if (column.key === 'email' && [0, 1].includes(rowIndex)) {
                        return [
                            {
                                required: false,
                                message: 'Please enter',
                            },
                        ];
                    }
                },
            },
        });
        document.getElementById('verify-btn').addEventListener('click', () => {
            grid.validate();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            grid.clearValidate();
        });
    </script>
</html>

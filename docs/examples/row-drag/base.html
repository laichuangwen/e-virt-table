<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table</title>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <body>
        <div id="e-virt-table"></div>
    </body>
    <script>
        let data = [
            { id: 1, date: '2016-05-03', name: 'Tom', state: 'California', city: 'Los Angeles', address: 'No. 189, Grove St, Los Angeles', zip: 'CA 90036' },
            { id: 2, date: '2016-05-02', name: 'Jerry', state: 'Texas', city: 'Houston', address: 'No. 256, Main St, Houston', zip: 'TX 77001' },
            { id: 3, date: '2016-05-04', name: 'Alice', state: 'Florida', city: 'Miami', address: 'No. 88, Oak Ave, Miami', zip: 'FL 33101' },
            { id: 4, date: '2016-05-01', name: 'Bob', state: 'New York', city: 'New York City', address: 'No. 312, Maple Dr, New York City', zip: 'NY 10001' },
            { id: 5, date: '2016-05-08', name: 'Cathy', state: 'Washington', city: 'Seattle', address: 'No. 501, Cedar Ln, Seattle', zip: 'WA 98101' },
            { id: 6, date: '2016-05-06', name: 'David', state: 'California', city: 'Los Angeles', address: 'No. 102, Grove St, Los Angeles', zip: 'CA 90012' },
            { id: 7, date: '2016-05-07', name: 'Eva', state: 'Texas', city: 'Houston', address: 'No. 777, Main St, Houston', zip: 'TX 77002' },
        ];
        let columns = [
            {
                type: 'index',
                dragRow: true,
                width: 56,
                align: 'center',
                readonly: true,
            },
            {
                title: 'Date',
                key: 'date',
                readonly: true,
            },
            {
                key: 'info',
                title: 'Delivery Info',
                children: [
                    {
                        title: 'Name',
                        key: 'name',
                        readonly: true,
                    },
                    {
                        title: 'Address',
                        key: 'Address Info',
                        readonly: true,
                        children: [
                            {
                                title: 'State',
                                key: 'state',
                                readonly: true,
                            },
                            {
                                title: 'City',
                                key: 'city',
                                readonly: true,
                            },
                            {
                                title: 'Address',
                                key: 'address',
                                readonly: true,
                                width: 200,
                            },
                            {
                                title: 'Zip',
                                key: 'zip',
                                readonly: true,
                            },
                        ],
                    },
                ],
            },
            {
                title: 'DragDisabled',
                key: 'dragDisabled',
                readonly: true,
            },
        ];
        const target = document.getElementById('e-virt-table');
        const grid = new EVirtTable(target, {
            data,
            columns,
            config: {
                ROW_KEY: 'id',
                ENABLE_DRAG_ROW: true,
            },
            });
            grid.on('dragRowChange', ({source, target, position}) => {
                console.log('dragRowChange', source.rowKey, target.rowKey, position);
            });
    </script>
</html>

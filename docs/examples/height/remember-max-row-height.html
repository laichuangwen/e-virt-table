<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table</title>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <style>
        .content {
            position: relative;
        }
    </style>
    <body>
        <div class="content">
            <div id="e-virt-table"></div>
            <div id="e-virt-table-overlayer"></div>
        </div>
    </body>
    <script>
        function generateData() {
            let columns = [
                {
                    type: 'index',
                    key: 'index',
                    width: 70,
                    fixed: 'left',
                },
                {
                    title: 'Name',
                    key: 'name',
                    width: 220,
                    fixed: 'left',
                },
                {
                    title: 'Date',
                    key: 'date',
                    width: 120,
                },
                {
                    title: 'City',
                    key: 'city',
                    width: 220,
                },
                {
                    title: 'State',
                    key: 'state',
                    width: 220,
                },
                {
                    title: 'Zip',
                    key: 'zip',
                    width: 200,
                },
                {
                    title: 'Long Text 1',
                    key: 'longText1',
                    width: 200,
                    autoRowHeight: true,
                    render: (pEl, cell) => {
                        const cellEl = document.createElement('div');
                        cellEl.setAttribute('data-auto-height', 'true');
                        cellEl.setAttribute('data-row-index', cell.rowIndex);
                        cellEl.setAttribute('data-col-index', cell.colIndex);
                        cellEl.style.width = '100%';
                        cellEl.style.padding= '3px';
                        cellEl.style.whiteSpace = 'normal';
                        cellEl.style.wordBreak = 'break-word';
                        cellEl.innerHTML = cell.value || '';
                        pEl.appendChild(cellEl);
                    },
                },
                {
                    title: 'Address',
                    key: 'address',
                    width: 200,
                },
                {
                    title: 'Long Text 2',
                    key: 'longText2',
                    width: 200,
                    autoRowHeight: true,
                    render: (pEl, cell) => {
                        const cellEl = document.createElement('div');
                        cellEl.setAttribute('data-auto-height', 'true');
                        cellEl.setAttribute('data-row-index', cell.rowIndex);
                        cellEl.setAttribute('data-col-index', cell.colIndex);
                        cellEl.style.width = '100%';
                        cellEl.style.padding= '3px';
                        cellEl.style.whiteSpace = 'normal';
                        cellEl.style.wordBreak = 'break-word';
                        cellEl.innerHTML = cell.value || '';
                        pEl.appendChild(cellEl);
                    },
                },
            ];

            // Add more columns for horizontal scrolling
            for (let i = 0; i < 30; i++) {
                columns.push({
                    title: `Col ${i + 1}`,
                    key: `col_${i}`,
                    width: 100,
                });
            }

            let data = [];
            const longTexts = [
                'This is a very long text content for testing auto row height. When content is long, cells wrap automatically and increase row height.',
                'Short text',
                'Medium length text for demonstration of how different text lengths affect row height.',
                'Super super super long text content that makes the cell very tall, used to test max row height recording.',
                'Normal text',
            ];

            for (let i = 0; i < 1000; i++) {
                const rowData = {
                    id: `row_${i}`,
                    name: `Tom${i + 1}`,
                    date: '2016-05-02',
                    city: 'Los Angeles',
                    state: 'California',
                    zip: 'CA 90036',
                    longText1: longTexts[i % longTexts.length],
                    address: `No. ${189 + i}, Grove St, Haidian, Beijing`,
                    longText2: longTexts[(i + 2) % longTexts.length],
                };
                // Add extra column data
                for (let j = 0; j < 30; j++) {
                    rowData[`col_${j}`] = `data_${i + 1}_${j + 1}`;
                }
                data.push(rowData);
            }

            return { columns, data };
        }

        const { columns, data } = generateData();
        const target = document.getElementById('e-virt-table');
        const overlayerEl = document.getElementById('e-virt-table-overlayer');

        const grid = new EVirtTable(target, {
            data,
            columns,
            config: {
                ROW_KEY: 'id',
                ENABLE_SELECTOR: true,
                ENABLE_AUTOFILL: true,
                ENABLE_OFFSET_HEIGHT: true,
                OFFSET_HEIGHT: 24,
            },
            overlayerElement: overlayerEl,
        });

        // Overlay rendering
        grid.on('overlayerChange', (container) => {
            if (!overlayerEl) {
                return;
            }
            overlayerEl.replaceChildren();
            Object.assign(overlayerEl.style, container.style);
            container.views.forEach((typeView) => {
                const typeDiv = document.createElement('div');
                typeDiv.className = typeView.class;
                Object.assign(typeDiv.style, typeView.style);
                typeView.views.forEach((cellWrapView) => {
                    const cellWrap = document.createElement('div');
                    Object.assign(cellWrap.style, cellWrapView.style);
                    cellWrapView.cells.forEach((cell) => {
                        const cellEl = document.createElement('div');
                        Object.assign(cellEl.style, cell.style);
                        if (typeof cell.render === 'function') {
                            cell.render(cellEl, cell);
                        }
                        cellWrap.appendChild(cellEl);
                    });
                    typeDiv.appendChild(cellWrap);
                });
                overlayerEl.appendChild(typeDiv);
            });
        });
    </script>
</html>

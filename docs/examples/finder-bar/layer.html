<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>e-virt-table - Find Overlay Content</title>
        <style>
            .asset-cell {
                box-sizing: border-box;
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                height: 100%;
                padding: 0 10px;
            }

            .asset-status {
                padding: 2px 6px;
                color: #fff;
                font-size: 12px;
                line-height: 18px;
                border-radius: 3px;
            }

            .asset-status.uploaded {
                background: #16a34a;
            }

            .asset-status.pending {
                background: #6b7280;
            }
        </style>
    </head>
    <script src="https://unpkg.com/e-virt-table/dist/index.umd.js"></script>
    <body>
        <div id="e-virt-table"></div>
    </body>
    <script>
        const getStatusText = (row) => (row.uploaded ? '已上传' : '未上传');

        const data = Array.from({ length: 80 }, (_, index) => ({
            id: index + 1,
            assetCode: `qa${String(5400 + index).padStart(5, '0')}`,
            uploaded: index % 3 !== 0,
            owner: ['Alice', 'Bob', 'Carol'][index % 3],
        }));

        const columns = [
            { type: 'index', key: 'index', width: 70 },
            {
                title: '素材编码',
                key: 'assetCode',
                width: 240,
                render(parent, cell) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'asset-cell';

                    const code = document.createElement('span');
                    code.textContent = cell.value;

                    const status = document.createElement('span');
                    status.className = `asset-status ${cell.row.uploaded ? 'uploaded' : 'pending'}`;
                    status.textContent = getStatusText(cell.row);

                    wrapper.append(code, status);
                    parent.appendChild(wrapper);
                },
                formatterFinderValue({ row }) {
                    return getStatusText(row);
                },
            },
            { title: '负责人', key: 'owner', width: 180 },
        ];

        new EVirtTable(document.getElementById('e-virt-table'), {
            columns,
            data,
            config: {
                ROW_KEY: 'id',
                HEIGHT: 360,
                ENABLE_FINDER: true,
            },
        });
    </script>
</html>
